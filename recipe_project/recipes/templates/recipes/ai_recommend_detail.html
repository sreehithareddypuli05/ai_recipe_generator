{% extends 'recipes/base.html' %}
{% load static %}

{% block title %}Recipe Details{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-10 offset-md-1">

            <div id="detail-loading" class="text-center">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="text-muted mt-2">Loading recipe...</p>
            </div>

            <div id="detail-error" class="alert alert-danger d-none"></div>

            <div id="detail-content" class="d-none">
                <div class="card mb-4">
                    <div class="card-body">
                        <h1 class="display-5 mb-3" id="d-name"></h1>
                        <div class="row text-center mb-3">
                            <div class="col-md-6">
                                <div class="p-3 bg-light rounded">
                                    <i class="fas fa-clock fa-2x text-primary mb-2"></i>
                                    <h5 id="d-minutes"></h5>
                                    <p class="mb-0 text-muted">Cooking Time</p>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="p-3 bg-light rounded">
                                    <i class="fas fa-percentage fa-2x text-info mb-2"></i>
                                    <h5 id="d-score"></h5>
                                    <p class="mb-0 text-muted">Match Score</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-header">
                        <h4 class="mb-0"><i class="fas fa-list"></i> Ingredients</h4>
                    </div>
                    <div class="card-body">
                        <ul class="list-group list-group-flush" id="d-ingredients"></ul>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-header">
                        <h4 class="mb-0"><i class="fas fa-tasks"></i> Preparation Steps</h4>
                    </div>
                    <div class="card-body">
                        <ol class="list-group list-group-numbered" id="d-steps"></ol>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body text-center">
                        <a href="{% url 'ai_recommend' %}" class="btn btn-primary">
                            <i class="fas fa-search"></i> Search More Recipes
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const RECIPE_ID = {{ recipe_id }};
</script>
<script src="{% static 'recipes/js/ai_recommend_detail.js' %}"></script>
{% endblock %}
